<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Satellite Project</title>
    <link rel="preconnect" href="https://cdn.tailwindcss.com" />
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "Segoe UI", "Arial"]
            },
            colors: {
              ink: "#111827",
              graphite: "#334155",
              mist: "#f5f7fb",
              signal: "#0f766e",
              amberline: "#d97706",
              risk: "#dc2626"
            },
            boxShadow: {
              premium: "0 18px 60px rgba(15, 23, 42, 0.10)"
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="text/babel" data-presets="react" src="./app.jsx"></script>
  </body>
</html>
